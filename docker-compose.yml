version: "3.8"

networks:
  nodealert-net:
    driver: bridge

volumes:
  mosquitto_data:
  mosquitto_log:
  mysql_data:

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - nodealert-net
    restart: unless-stopped

  django:
    build: ./NodeAlert-Backend
    container_name: django
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - mosquitto
    networks:
      - nodealert-net
    restart: unless-stopped

  frontend:
    build: ./NodeAlert-Frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - django
    networks:
      - nodealert-net
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: mysql
    env_file: .env
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - nodealert-net
    restart: unless-stopped
