version: "3.8"

networks:
  nodealert-net:
    driver: bridge

volumes:
  mosquitto_data:
  mosquitto_log:
  mysql_data:

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - nodealert-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "\$SYS/#", "-C", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mysql:
    image: mysql:8.0
    container_name: mysql
    env_file: .env
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - nodealert-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  django:
    build: ./NodeAlert-Backend
    container_name: django
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - nodealert-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  frontend:
    build: ./NodeAlert-Frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - django
    networks:
      - nodealert-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
