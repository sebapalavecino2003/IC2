# Configuración de nginx para servir el frontend NodeAlert.
# Sirve archivos estáticos del SPA y redirige /api/ al backend Django.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Para SPA: todas las rutas no coincidentes devuelven index.html
    # para que React Router maneje el enrutamiento del lado del cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Resolver DNS interno de Docker para el nombre 'django'.
    resolver 127.0.0.11 valid=10s;

    # Proxy inverso para la API REST.
    # Las solicitudes /api/ se reenvían al contenedor Django.
    location /api/ {
        set $backend "http://django:8000";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
