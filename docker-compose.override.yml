# Override de Docker Compose para desarrollo local.
# Desactiva el restart automático de mosquitto (evita reinicios
# molestos al detener el stack) y monta el código fuente de Django
# como volumen para recarga en caliente con el dev server.
services:
  mosquitto:
    restart: "no"

  django:
    volumes:
      - ./NodeAlert-Backend:/app
