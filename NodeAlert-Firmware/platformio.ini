; NodeAlert IoT Firmware
; PlatformIO project configuration
; ESP32 + ESP-IDF framework for environmental monitoring

[platformio]
description = NodeAlert IoT — Environmental monitoring firmware for ESP32

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 115200

; Source directories
build_flags =
    -I src/core
    -I src/hal
    -I src/drivers/sensor
    -I src/managers
    -I src/services
    -I src/config
    -I include

; Library dependencies (v1: none external)
lib_deps =

; Test configuration
[env:test]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 115200
test_build_src = true
