; Configuración de PlatformIO para el firmware NodeAlert ESP32.
; Define el entorno de compilación para la placa ESP32 DevKit con
; el framework Arduino y las librerías necesarias.
[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0       ; Serialización/deserialización JSON
    knolleary/PubSubClient @ ^2.8        ; Cliente MQTT para ESP32
    adafruit/DHT sensor library @ ^1.4.4 ; Driver para sensor DHT22
    adafruit/Adafruit Unified Sensor @ ^1.1.9 ; Capa de abstracción de sensores Adafruit
build_flags =
