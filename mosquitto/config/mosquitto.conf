# =============================================================================
# Mosquitto MQTT Broker Configuration — NodeAlert IoT
# =============================================================================
# This file is mounted read-only into the container at /mosquitto/config/.
# Credentials are stored in mosquitto_passwd (generated by setup.sh).
# =============================================================================

# --- Network ----------------------------------------------------------------
listener 1883 0.0.0.0

# --- Authentication ---------------------------------------------------------
allow_anonymous false
password_file /mosquitto/config/mosquitto_passwd

# --- Persistence ------------------------------------------------------------
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db
autosave_interval 900

# --- Logging ----------------------------------------------------------------
log_dest file /mosquitto/log/mosquitto.log
log_type all
connection_messages true
log_timestamp true

# --- Retained Messages ------------------------------------------------------
retain_available true

# --- Message Limits ---------------------------------------------------------
max_queued_messages 1000
max_inflight_messages 20
