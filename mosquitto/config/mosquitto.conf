# =============================================================================
# Mosquitto MQTT Broker — Configuración NodeAlert IoT
# =============================================================================
# Montado como solo-lectura en /mosquitto/config/ dentro del contenedor.
# Las credenciales están en mosquitto_passwd (generado por setup.sh).
# =============================================================================

# --- Red ----------------------------------------------------------------
# Escucha en puerto 1883 en todas las interfaces (0.0.0.0)
listener 1883 0.0.0.0

# --- Autenticación -------------------------------------------------------
# No se aceptan conexiones anónimas — todo cliente debe autenticarse.
# Esto evita que dispositivos no autorizados publiquen o se suscriban
# a topics del sistema.
allow_anonymous false

# Archivo con usuarios y contraseñas hasheadas (formato $7$ de Mosquitto).
# Se genera automáticamente mediante setup.sh con mosquitto_passwd.
password_file /mosquitto/config/mosquitto_passwd

# --- Persistencia --------------------------------------------------------
# Guarda los mensajes retained y suscripciones en disco para sobrevivir
# a reinicios del contenedor sin perder el estado del broker.
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db

# Guarda automáticamente cada 900 segundos (15 min) para reducir
# escrituras en disco en ambientes con tarjeta SD.
autosave_interval 900

# --- Logging -------------------------------------------------------------
log_dest file /mosquitto/log/mosquitto.log
log_type all                     # Registra todo: conexiones, publicaciones, errores
connection_messages true         # Muestra cuando un cliente se conecta/desconecta
log_timestamp true               # Agrega timestamp a cada línea de log

# --- Mensajes Retenidos --------------------------------------------------
# Permite que los clientes publiquen con flag retained (último estado).
# Útil para que el backend conozca el último estado conocido de un nodo
# incluso si el nodo está dormido.
retain_available true

# --- Límites de Mensajes ------------------------------------------------
# Máximo de mensajes encolados por cliente (evita desbordar RAM del broker
# si un subscriber se desconecta y acumula mensajes).
max_queued_messages 1000

# Máximo de mensajes en vuelo simultáneos por cliente (QoS > 0).
max_inflight_messages 20
